<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전설의 고향김밥</title>
    <link href="https://cdn.jsdelivr.net/gh/DungGeunMo/DungGeunMo/DungGeunMo.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body { font-family: 'DungGeunMo', sans-serif; background: #f0e6d2; margin: 0; overflow: hidden; height: 100vh; user-select: none; -webkit-user-select: none; }
        .hidden { display: none !important; }
        button { font-family: 'DungGeunMo', sans-serif; cursor: pointer; }

        /* ── 게임 레이아웃 ── */
        #game-screen { display: flex; width: 100%; height: 100%; background: #e8d5b5; position: relative; overflow: hidden; transition: transform 0.05s; }
        .main-panel { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 4px solid black; z-index: 10; }
        .side-panel { width: 240px; background: #d4c5a3; border-left: 4px solid black; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; box-shadow: inset 4px 4px 0 rgba(0,0,0,0.2); z-index: 10; }
        .scoreboard { position: absolute; top: 30px; background: black; color: #55ff55; padding: 10px 20px; border: 4px solid #333; font-size: 1.5rem; text-shadow: 2px 2px 0 #003300; z-index: 20; text-align: center; pointer-events: none; }

        /* ── 판정바 ── */
        #rhythm-wrapper { position: relative; width: 580px; height: 34px; margin-bottom: 5px; z-index: 30; }
        .rhythm-area { width: 100%; height: 100%; background: #222; border: 4px solid black; position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }
        .beat-marker { width: 20px; height: 100%; background: #ffff00; position: absolute; left: 50%; transform: translateX(-50%); opacity: 0.7; z-index: 15; }
        .good-zone { width: 60px; height: 100%; background: rgba(255,255,0,0.18); position: absolute; left: 50%; transform: translateX(-50%); z-index: 12; }
        .fake-marker { width: 20px; height: 100%; background: #ffff00; position: absolute; left: 50%; transform: translateX(-50%); opacity: 0.7; z-index: 15; }
        .moving-bar { width: 18px; height: 100%; background: #ff2222; position: absolute; top: 0; left: 0; z-index: 25; pointer-events: none; }
        #feedback-msg { font-size: 2.2rem; margin-top: 10px; text-shadow: 2px 2px 0 black; height: 36px; pointer-events: none; z-index: 20; position: relative; }

        /* ── 도마 재료 ── */
        .cutting-board { width: 480px; height: 340px; background: #c7b299; border: 6px solid black; box-shadow: 6px 6px 0 black; position: relative; margin-bottom: 50px; pointer-events: none; }
        .stack-zone { position: absolute; bottom: 10%; left: 0; width: 100%; height: 250px; }
        .g-base { position: absolute; left: 50%; transform-origin: center; border: 3px solid black; box-sizing: border-box; box-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
        .g-gim { width: 240px; height: 160px; background: #111; }
        .g-rice { width: 220px; height: 140px; background: #fff; border-color: #ccc; }
        .c-ham { width: 200px; height: 25px; background: #ff6666; }
        .c-egg { width: 200px; height: 25px; background: #ffcc00; }
        .c-spinach { width: 200px; height: 25px; background: #33cc33; }
        .c-carrot { width: 200px; height: 25px; background: #ff6600; }
        .c-danmuji { width: 200px; height: 20px; background: #ffff00; }
        .c-tuna { width: 190px; height: 35px; background: #d2b48c; }
        .c-mayo { width: 180px; height: 10px; background: #ffffe0; border-radius: 5px; }
        .c-leaf { width: 210px; height: 15px; background: #228b22; }
        .c-cheese { width: 210px; height: 10px; background: #ffd700; }
        .c-donkatsu { width: 190px; height: 45px; background: #8b4513; }
        .c-squid { width: 190px; height: 30px; background: #ff4500; }

        /* ── 사이드 ── */
        .right-header { font-size: 1.2rem; margin-bottom: 20px; color: black; border-bottom: 4px solid black; width: 100%; text-align: center; }
        .history-item { background: #fff; border: 3px solid black; width: 90%; padding: 5px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
        .history-item.new-slam { animation: slam-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slam-in { 0% { transform: scale(3) rotate(-15deg); opacity: 0; } 50% { transform: scale(0.8) rotate(5deg); } 100% { transform: scale(1) rotate(0deg); box-shadow: 3px 3px 0 black; } }
        .mini-gimbap { width: 28px; height: 28px; border: 3px solid black; background: white; position: relative; flex-shrink: 0; border-radius: 50%; }
        .mini-gimbap::after { content: ''; position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); width: 12px; height: 12px; border-radius: 50%; }
        .icon-basic::after { background: conic-gradient(#ff6666 0 25%, #ffcc00 25% 50%, #33cc33 50% 75%, #ff6600 75% 100%); }
        .icon-tuna::after { background: conic-gradient(#d2b48c 0 50%, #228b22 50% 75%, #ffff00 75% 100%); }
        .icon-cheese::after { background: conic-gradient(#ffd700 0 50%, #ff6666 50% 75%, #ffcc00 75% 100%); }
        .icon-donkatsu::after { background: conic-gradient(#8b4513 0 50%, #ffff00 50% 75%, #33cc33 75% 100%); }
        .icon-squid::after { background: conic-gradient(#ff4500 0 50%, #228b22 50% 75%, #ffcc00 75% 100%); }
        .tag-legend { color: #ff00ff; font-weight: bold; text-shadow: 1px 1px 0 black; }
        .tag-bad { color: #8B4513; }
        .tag-trash { color: red; text-decoration: line-through; }

        /* ── 기믹 ── */
        .gimmick-mouse-wrapper { position: fixed; z-index: 99999; pointer-events: none; width: 140px; height: 80px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .gimmick-cat-arm { position: fixed; width: 220px; z-index: 99999; pointer-events: none; background-size: 100% auto; background-repeat: no-repeat; background-position: top center; }
        .pacman { width: 60px; height: 60px; background: #ffcc00; border-radius: 50%; position: absolute; top: -15px; z-index: 90; border: 3px solid black; clip-path: polygon(100% 0%,100% 100%,0% 100%,0% 80%,50% 50%,0% 20%,0% 0%); animation: pacman-chomp 0.2s infinite alternate, pacman-move 4.5s linear forwards; }
        @keyframes pacman-chomp { 0% { clip-path: polygon(100% 0%,100% 100%,0% 100%,0% 80%,50% 50%,0% 20%,0% 0%); } 100% { clip-path: polygon(100% 0%,100% 100%,0% 100%,0% 50%,50% 50%,0% 50%,0% 0%); } }
        @keyframes pacman-move { 0% { right: -60px; } 100% { right: 620px; } }
        .explosion-particle { position: absolute; pointer-events: none; z-index: 100; }
        @keyframes explode { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx),var(--ty)) scale(0); opacity: 0; } }
        @keyframes fade-dark { 0% { opacity:1; filter:brightness(100%); } 100% { opacity:0.18; filter:brightness(45%); } }
        @keyframes spin-rhythm { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }

        /* ── 인트로 ── */
        #intro-screen { position: fixed; inset: 0; background: #5c94fc; z-index: 100; }
        #intro-canvas { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .note-paper { position: absolute; top: 30px; right: 30px; background: #ffffcc; border: 4px solid black; padding: 20px; box-shadow: 6px 6px 0 black; font-size: 1.2rem; color: black; z-index: 10; font-weight: bold; min-width: 220px; text-align: center; line-height: 1.5; }
        #start-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 20; text-align: center; cursor: pointer; }
        .pixel-btn-container { width: 160px; height: 160px; background: white; border: 8px solid black; display: flex; justify-content: center; align-items: center; flex-direction: column; box-shadow: 8px 8px 0 black; transition: transform 0.1s; }
        .pixel-btn-container:hover { transform: translate(-4px,-4px); box-shadow: 12px 12px 0 black; }
        .css-pixel-gimbap { width: 50px; height: 50px; background: black; position: relative; margin-bottom: 10px; }
        .css-pixel-gimbap::before { content:''; position:absolute; top:4px; left:4px; width:42px; height:42px; background:white; }
        .css-pixel-gimbap::after { content:''; position:absolute; top:16px; left:16px; width:8px; height:18px; background:#ff6666; box-shadow:10px 0 0 #ffcc00,5px 5px 0 #33cc33; }

        /* ── 모달 ── */
        #name-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 200; }
        .modal-box { background: #c7b299; border: 6px solid black; padding: 30px; text-align: center; box-shadow: 8px 8px 0 black; min-width: 320px; }
        input[type=text] { padding: 5px; font-size: 1.2rem; border: 4px solid black; text-align: center; font-family: 'DungGeunMo'; }
        .common-btn { padding: 10px 20px; font-size: 1.2rem; background: #ff9900; color: black; border: 4px solid black; box-shadow: 4px 4px 0 black; }
        .common-btn:active { transform: translate(4px,4px); box-shadow: 0 0 0 black; }

        /* ── 자격증 화면 ── */
        #license-screen { position: fixed; inset: 0; background: #1a1a1a; z-index: 300; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; padding: 10px 0; }
        .license-paper { padding: 24px 28px; width: 460px; text-align: left; position: relative; clip-path: inset(0 0 100% 0); animation: scroll-unfurl 0.8s cubic-bezier(0.22,1,0.36,1) 0.1s forwards; }
        @keyframes scroll-unfurl { 0% { clip-path: inset(0 0 100% 0); transform: scaleY(0.5); transform-origin: top; } 60% { clip-path: inset(0 0 3% 0); transform: scaleY(1.02); } 100% { clip-path: inset(0 0 0% 0); transform: scaleY(1); } }

        .theme-s { background: #fffbe6; border: 12px double #ffd700; box-shadow: 0 0 30px rgba(255,215,0,0.5), 12px 12px 0 #333; background-image: repeating-linear-gradient(45deg,rgba(255,215,0,0.07) 0,rgba(255,215,0,0.07) 2px,transparent 2px,transparent 12px); }
        .theme-a { background: #e8f4ff; border: 12px double #4488ff; box-shadow: 0 0 20px rgba(68,136,255,0.3), 12px 12px 0 #333; }
        .theme-b { background: #edfff0; border: 12px double #33aa55; box-shadow: 0 0 20px rgba(51,170,85,0.3), 12px 12px 0 #333; }
        .theme-c { background: #fff8ee; border: 12px double #ff8800; box-shadow: 12px 12px 0 #333; }
        .theme-f { background: #2a1208; border: 12px double #7a1f12; box-shadow: 12px 12px 0 #000; color: #f2b39d; background-image: repeating-linear-gradient(135deg, rgba(255,120,80,0.05) 0, rgba(255,120,80,0.05) 2px, transparent 2px, transparent 14px); }

        .cert-header { text-align: center; font-size: 1.7rem; padding-bottom: 12px; margin: 0; letter-spacing: 4px; }
        .theme-s .cert-header { border-bottom: 3px solid #ffd700; color: #996600; text-shadow: 0 0 12px rgba(255,215,0,0.6); }
        .theme-a .cert-header { border-bottom: 3px solid #4488ff; color: #224488; }
        .theme-b .cert-header { border-bottom: 3px solid #33aa55; color: #1a5530; }
        .theme-c .cert-header { border-bottom: 3px solid #ff8800; color: #884400; }
        .theme-f .cert-header { border-bottom: 3px solid #7a1f12; color: #ff6b47; text-shadow: 0 0 6px rgba(255,80,40,0.45); }

        .cert-top-meta { display: flex; justify-content: flex-end; margin: 10px 0 8px; }
        .cert-grade-chip { min-width: 116px; padding: 6px 10px; border: 3px solid; font-size: 0.9rem; font-weight: bold; text-align: center; letter-spacing: 1px; }
        .theme-s .cert-grade-chip { color: #996600; border-color: #ffd700; background: rgba(255,215,0,0.1); }
        .theme-a .cert-grade-chip { color: #224488; border-color: #4488ff; background: rgba(68,136,255,0.08); }
        .theme-b .cert-grade-chip { color: #1a5530; border-color: #33aa55; background: rgba(51,170,85,0.08); }
        .theme-c .cert-grade-chip { color: #884400; border-color: #ff8800; background: rgba(255,136,0,0.08); }
        .theme-f .cert-grade-chip { color: #ff8a66; border-color: #7a1f12; background: rgba(255,120,80,0.10); }

        .cert-illust-stage { width: 100%; height: 150px; margin: 0 0 14px 0; border: 3px solid; overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.04); position: relative; }
        .theme-s .cert-illust-stage { border-color: rgba(255,215,0,0.5); background: rgba(255,215,0,0.06); }
        .theme-a .cert-illust-stage { border-color: rgba(68,136,255,0.4); background: rgba(68,136,255,0.05); }
        .theme-b .cert-illust-stage { border-color: rgba(51,170,85,0.4); background: rgba(51,170,85,0.05); }
        .theme-c .cert-illust-stage { border-color: rgba(255,136,0,0.4); background: rgba(255,136,0,0.05); }
        .theme-f .cert-illust-stage { border-color: rgba(255,120,80,0.35); background: rgba(255,120,80,0.04); }
        .cert-illust-stage img { width: 100%; height: 100%; object-fit: contain; image-rendering: auto; display: block; }
        .cert-illust-stage .illust-ph { display: none; font-size: 0.8rem; text-align: center; line-height: 1.5; padding: 0 14px; word-break: keep-all; }
        .cert-illust-stage.no-illust img { display: none; }
        .cert-illust-stage.no-illust .illust-ph { display: block; }
        .theme-s .cert-illust-stage .illust-ph { color: #997700; }
        .theme-a .cert-illust-stage .illust-ph { color: #335599; }
        .theme-b .cert-illust-stage .illust-ph { color: #2a6a45; }
        .theme-c .cert-illust-stage .illust-ph { color: #9a5b00; }
        .theme-f .cert-illust-stage .illust-ph { color: #ff9b7e; }

        .cert-name { font-size: 1.1rem; font-weight: bold; text-align: center; line-height: 1.7; margin-bottom: 2px; }
        .cert-rank-title { font-size: 1.25rem; font-weight: bold; text-align: center; line-height: 1.55; margin-bottom: 8px; }
        .theme-s .cert-rank-title { color: #996600; }
        .theme-a .cert-rank-title { color: #224488; }
        .theme-b .cert-rank-title { color: #1a5530; }
        .theme-c .cert-rank-title { color: #884400; }
        .theme-f .cert-rank-title { color: #ff7a57; }

        .cert-quote { font-size: 0.9rem; line-height: 1.55; padding: 10px 12px; margin: 8px 0; }
        .theme-s .cert-quote { background: rgba(255,215,0,0.12); border-left: 5px solid #ffd700; color: #665500; }
        .theme-a .cert-quote { background: rgba(68,136,255,0.08); border-left: 5px solid #4488ff; color: #334466; }
        .theme-b .cert-quote { background: rgba(51,170,85,0.08); border-left: 5px solid #33aa55; color: #224433; }
        .theme-c .cert-quote { background: rgba(255,136,0,0.08); border-left: 5px solid #ff8800; color: #553300; }
        .theme-f .cert-quote { background: rgba(255,120,80,0.08); border-left: 5px solid #7a1f12; color: #ffd2c4; }

        .cert-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin: 10px 0; }
        .stat-item { padding: 5px 6px; text-align: center; border: 2px solid; font-size: 0.72rem; }
        .theme-s .stat-item { border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.06); }
        .theme-a .stat-item { border-color: rgba(68,136,255,0.3); background: rgba(68,136,255,0.05); }
        .theme-b .stat-item { border-color: rgba(51,170,85,0.3); background: rgba(51,170,85,0.05); }
        .theme-c .stat-item { border-color: rgba(255,136,0,0.3); background: rgba(255,136,0,0.05); }
        .theme-f .stat-item { border-color: rgba(255,120,80,0.24); background: rgba(255,120,80,0.05); }
        .stat-num { font-size: 1rem; font-weight: bold; display: block; }
        .theme-s .stat-num { color: #aa8800; }
        .theme-a .stat-num { color: #2255aa; }
        .theme-b .stat-num { color: #227744; }
        .theme-c .stat-num { color: #cc6600; }
        .theme-f .stat-num { color: #ff7a57; }

        .cert-score-box { text-align: center; padding: 7px; margin-top: 6px; font-size: 1rem; font-weight: bold; border: 2px dashed; }
        .theme-s .cert-score-box { border-color: #ffd700; color: #996600; background: rgba(255,215,0,0.08); }
        .theme-a .cert-score-box { border-color: #4488ff; color: #224488; }
        .theme-b .cert-score-box { border-color: #33aa55; color: #1a5530; }
        .theme-c .cert-score-box { border-color: #ff8800; color: #884400; }
        .theme-f .cert-score-box { border-color: #7a1f12; color: #ff8a66; background: rgba(255,120,80,0.06); }

        .cert-footer { text-align: center; font-size: 0.95rem; font-weight: bold; margin-top: 14px; }
        .cert-seal { position: absolute; bottom: 20px; right: 24px; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.75rem; font-weight: bold; border: 4px double; transform: rotate(-15deg); line-height: 1.2; opacity: 0; z-index: 10; animation: stamp-in 0.25s cubic-bezier(0.17,0.67,0.35,1.4) 1.1s forwards; }
        @keyframes stamp-in { 0%{opacity:0;transform:scale(2.5) rotate(-20deg);} 70%{opacity:1;transform:scale(0.9) rotate(5deg);} 100%{opacity:1;transform:scale(1) rotate(-15deg);} }
        .theme-s .cert-seal, .theme-a .cert-seal, .theme-b .cert-seal, .theme-c .cert-seal { color: #cc0000; border-color: #cc0000; }
        .theme-f .cert-seal { color: #ff5e3a; border-color: #7a1f12; }
        .theme-f::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(180deg, transparent 0, transparent 18px, rgba(255,120,80,0.025) 18px, rgba(255,120,80,0.025) 20px); pointer-events:none; z-index:1; }
        .theme-f .cert-header, .theme-f .cert-top-meta, .theme-f .cert-name, .theme-f .cert-rank-title, .theme-f .cert-quote, .theme-f .cert-stats, .theme-f .cert-score-box, .theme-f .cert-footer, .theme-f .cert-illust-stage { position:relative; z-index:2; }

        .share-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; opacity: 0; animation: fade-up 0.4s ease 1.1s forwards; }
        @keyframes fade-up { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
        .share-btn { padding: 10px 16px; font-size: 0.95rem; border: 3px solid black; box-shadow: 3px 3px 0 black; font-weight: bold; font-family: 'DungGeunMo'; cursor: pointer; }
        .share-btn:active { transform: translate(3px,3px); box-shadow: 0 0; }
        .btn-img { background: #4caf50; color: white; }
        .btn-x { background: #000; color: white; }
        .btn-retry { background: #ff9900; color: black; }
    </style>
</head>
<body>

<div id="intro-screen">
    <canvas id="intro-canvas"></canvas>
    <div class="note-paper">
        [김밥의 달인이 되자!]<br><br>
        스페이스바, 클릭, 터치!<br><br>
        7번 누르면 김밥 완성!
    </div>
    <div id="start-center" onclick="startGame()">
        <div class="pixel-btn-container">
            <div class="css-pixel-gimbap"></div>
            <span style="font-size:1.5rem;font-weight:bold;">START</span>
        </div>
    </div>
</div>

<div id="name-modal" class="hidden">
    <div class="modal-box">
        <h2>자격증에 적을 이름은?</h2>
        <p id="name-error" style="color:red;display:none;margin:0 0 10px;font-size:1rem;font-weight:bold;">최소 1글자 이상 입력해 주세요.</p>
        <input type="text" id="username" maxlength="8" placeholder="이름 입력">
        <br><br>
        <button class="common-btn" onclick="submitNameAndShowLicense()">발급</button>
    </div>
</div>

<div id="game-screen" class="hidden">
    <div class="main-panel" id="main-panel">
        <div class="scoreboard">
            ROUND: <span id="round-disp" style="color:yellow">1/7</span><br>
            <span id="recipe-name" style="font-size:1rem;color:white;"></span>
        </div>
        <div class="cutting-board" id="board-container">
            <div id="stack-zone" class="stack-zone"></div>
        </div>
        <div id="rhythm-wrapper">
            <div class="rhythm-area" id="rhythm-area">
                <div class="good-zone" id="good-zone"></div>
                <div class="beat-marker" id="beat-marker"></div>
            </div>
            <div id="rhythm-bar" class="moving-bar"></div>
        </div>
        <p id="feedback-msg" style="color:black;">준비...</p>
    </div>
    <div class="side-panel">
        <div class="right-header">완성 목록</div>
        <div id="history-list" style="width:100%;"></div>
    </div>
</div>

<div id="license-screen" class="hidden">
    <div class="license-paper" id="capture-area">
        <div class="cert-seal">마김<br>협회인</div>
        <div class="cert-header">[ 자 격 증 ]</div>

        <div class="cert-top-meta">
            <div class="cert-grade-chip" id="lic-grade-chip">S GRADE</div>
        </div>

        <div class="cert-illust-stage no-illust" id="cert-illust-stage">
            <img id="cert-illust-img" src="" alt="등급 일러스트">
            <div class="illust-ph" id="cert-illust-ph">여기에 등급별 일러스트가 들어갑니다</div>
        </div>

        <div class="cert-name">성 명 : <span id="lic-name" style="border-bottom:3px solid currentColor;padding:0 8px;"></span></div>
        <div class="cert-rank-title" id="lic-rank"></div>
        <div class="cert-quote" id="lic-quote"></div>

<script>
/* ═══ 효과음 ═══ */
let _actx = null;
function actx(){ if(!_actx) _actx = new(window.AudioContext||window.webkitAudioContext)(); if(_actx.state==='suspended') _actx.resume(); return _actx; }
function sfxPerfect(){ const c=actx(),t=c.currentTime; [[523.3,0],[659.3,0.04],[784,0.08]].forEach(([f,d])=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f; g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(0.35,t+d+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+d+0.4); o.start(t+d);o.stop(t+d+0.4); }); }
function sfxGood(){ const c=actx(),t=c.currentTime,o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=440; g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1); o.start(t);o.stop(t+0.1); }
function sfxBad(){ const c=actx(),t=c.currentTime,o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);o.type='sawtooth'; o.frequency.setValueAtTime(130,t);o.frequency.exponentialRampToValueAtTime(70,t+0.2); g.gain.setValueAtTime(0.28,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22); o.start(t);o.stop(t+0.22); }
function sfxMiss(){ const c=actx(),t=c.currentTime,o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);o.type='square'; o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(55,t+0.25); g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.26); o.start(t);o.stop(t+0.26); }
function sfxFanfare(){ const c=actx(),t=c.currentTime; [261.6,329.6,392,523.3].forEach((f,i)=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=f; const s=t+i*0.1; g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.25,s+0.02);g.gain.exponentialRampToValueAtTime(0.001,s+0.18); o.start(s);o.stop(s+0.18); }); [523.3,659.3,784].forEach(f=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=f; const s=t+0.42; g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.2,s+0.03);g.gain.setValueAtTime(0.2,s+0.4);g.gain.exponentialRampToValueAtTime(0.001,s+0.9); o.start(s);o.stop(s+0.9); }); }

/* ═══ 이미지 처리 ═══ */
const RAW_IMAGES = { mouse:'mousemoving.png', catPaw:'cat_hand.png' };

function processImage(key,src){ const img=new Image(); img.crossOrigin='Anonymous'; img.onload=()=>{ const cv=document.createElement('canvas'); cv.width=img.width; cv.height=img.height; const c=cv.getContext('2d'); c.drawImage(img,0,0); const d=c.getImageData(0,0,cv.width,cv.height); for(let i=0;i<d.data.length;i+=4) if(d.data[i]>240&&d.data[i+1]>240&&d.data[i+2]>240) d.data[i+3]=0; c.putImageData(d,0,0); PROC[key]=cv.toDataURL(); }; img.onerror=()=>{ PROC[key]=src; }; img.src=src; }
for(let k in RAW_IMAGES) processImage(k,RAW_IMAGES[k]);

/* ═══ 인트로 캔버스 ═══ */
const introCanvas=document.getElementById('intro-canvas');

ictx.imageSmoothingEnabled=false;
class PixelSlice{
    constructor(){ this.x=Math.random()*introCanvas.width; this.y=Math.random()*introCanvas.height; this.size=32; this.dx=(Math.random()-.5)*3; this.dy=(Math.random()-.5)*3; }
    draw(){ ictx.fillStyle='black'; ictx.fillRect(this.x,this.y,this.size,this.size); ictx.fillStyle='white'; ictx.fillRect(this.x+4,this.y+4,this.size-8,this.size-8); ictx.fillStyle='#ff6666'; ictx.fillRect(this.x+12,this.y+12,8,8); }
    update(mx,my){ this.x+=this.dx; this.y+=this.dy; if(this.x<0||this.x>introCanvas.width)this.dx*=-1; if(this.y<0||this.y>introCanvas.height)this.dy*=-1; if(Math.hypot(this.x-mx,this.y-my)<120){this.x+=(this.x-mx)*.08;this.y+=(this.y-my)*.08;} }
}
let slices=Array(30).fill(null).map(()=>new PixelSlice()), imx=-999, imy=-999;
document.addEventListener('mousemove',e=>{imx=e.clientX;imy=e.clientY;});
(function anim(){ ictx.clearRect(0,0,introCanvas.width,introCanvas.height); slices.forEach(s=>{s.draw();s.update(imx,imy);}); requestAnimationFrame(anim); })();

/* ═══ 게임 데이터 ═══ */
const allRecipes=[

    {name:'김치즈~ 김밥',              cls:'icon-cheese',   items:['g-gim','g-rice','c-cheese','c-ham','c-egg','c-carrot','c-danmuji']},
    {name:'돈까스 먹물 김밥',           cls:'icon-donkatsu', items:['g-gim','g-rice','c-donkatsu','c-spinach','c-danmuji','c-carrot','c-egg']},
    {name:'춤추는 오징어 김밥',         cls:'icon-squid',    items:['g-gim','g-rice','c-leaf','c-squid','c-egg','c-carrot','c-danmuji']},
];

let userName='', r=1, step=0, score=0, totalSum=0;
let barPos=0, barDir=1, speed=2.8, gameLoop=null, locked=false;
let distractionInterval=null, pacmanActive=false, lastClickTime=0;
let currentRecipe=[], currentRecipeName='', currentRecipeIcon='';
let totalPerfect=0, totalGood=0, totalBad=0, totalMiss=0;

/*
 * markerCenter: 판정 기준점 (barPos와 같은 0~100 단위)
 * 기본값 50. gimmickMovingMarker와 gimmickFakeMarkers가 이 값을 바꿈.
 * handleInput은 오직 이 값만 참조 — DOM 좌표 일절 불사용.

let markerCenter = 50;
let speedBurst=false, barFrozen=false;

const ROUND_SPEEDS = { 1:3.2, 2:3.4, 3:3.6, 4:3.8, 5:4.0, 6:4.2, 7:4.4 };

const RANK_DATA = {
    S: { badge:'S', theme:'theme-s', rankLabel:'S랭크', rankName:'전설의 고향 김밥 셰프', desc:'당신은 전설의 고향 김밥으로 세계 유일의 미슐랭 3스타 김밥 파인다이닝 셰프가 되었습니다. 특히 당신이 만든 전설의 춤추는 김밥은 실제로 시식한 모두를 춤추게 만들어, 전 세계적으로 유명해졌습니다. 이제 당신을 뛰어넘을 존재는 없습니다.' },
    A: { badge:'A', theme:'theme-a', rankLabel:'A랭크', rankName:'호텔 셰프', desc:'반지르르한 호텔에서 반지르르한 김밥을 10초에 100개 만들 수 있는 것으로 유명한 당신! 모든 김밥을 총괄하는 총괄 김밥 셰프이기도 합니다. 언젠가는 나만의 김밥 레스토랑을 차릴 수 있을까요? 유망주인 당신이라면 가능할지도 모릅니다.' },
    B: { badge:'B', theme:'theme-b', rankLabel:'B랭크', rankName:'동네 맛집 사장 중 한 명', desc:'인터넷에 검색하면 그래도 상위 5개 안에는 드는 맛집을 운영하게 되었군요. 이 동네에서는 모르는 사람이 없습니다. 더 정진해서 전국구 탑 5에 들도록 노력해 봐요.' },

};

function getGrade(avg){ if(avg>=95)return'S'; if(avg>=82)return'A'; if(avg>=65)return'B'; if(avg>=45)return'C'; return'F'; }

/* markerCenter와 beat-marker 위치를 항상 동기화
   barPos 단위(0~100)로 관리. beat-marker는 px로 직접 배치 */
function setJudgeCenter(pct){
    markerCenter = pct;
    const innerW = 572, barW = 18, maxLeft = innerW - barW;
    const markerW = 20;
    const goodW = 60;
    // 빨간 바 중앙이 있는 px 위치
    const centerPx = (pct / 100) * maxLeft + barW / 2;
    const bm = document.getElementById('beat-marker');
    const gz = document.getElementById('good-zone');
    // beat-marker: 중앙 centerPx에 맞춤
    bm.style.left = (centerPx - markerW / 2) + 'px';
    bm.style.transform = 'none';
    // good-zone: beat-marker와 같은 중앙에 맞춤
    if(gz){
        gz.style.left = (centerPx - goodW / 2) + 'px';
        gz.style.transform = 'none';
    }
}

/* ═══ 시작 ═══ */
function startGame(){
    document.getElementById('intro-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    document.addEventListener('keydown',handleInput);
    const gs=document.getElementById('game-screen');
    // touchstart만 등록. preventDefault로 후속 mousedown 차단
    gs.addEventListener('touchstart',handleInput,{passive:false});
    // mousedown은 터치가 없는 PC에서만 동작하도록
    gs.addEventListener('mousedown',function(e){
        // 터치 직후 발생하는 ghost mousedown 무시
        if(e.sourceCapabilities && !e.sourceCapabilities.firesTouchEvents){
            handleInput(e);
        } else if(!e.sourceCapabilities) {
            // sourceCapabilities 미지원 브라우저 — lastClickTime으로 필터
            handleInput(e);
        }
    });
    initRound();
}

    document.getElementById('username').value=userName;

/* ═══ 라운드 초기화 ═══ */
function initRound(){
    step=0; score=0; locked=false; pacmanActive=false;
    speedBurst=false; barFrozen=false;
    barPos=0; barDir=1;

    document.getElementById('round-disp').innerText=`${r}/7`;
    const rec=allRecipes[Math.floor(Math.random()*allRecipes.length)];
    currentRecipe=rec.items; currentRecipeName=rec.name; currentRecipeIcon=rec.cls;
    document.getElementById('recipe-name').innerText=currentRecipeName;
    document.getElementById('stack-zone').innerHTML='';
    document.getElementById('feedback-msg').innerText='READY';

    const rw=document.getElementById('rhythm-wrapper');
    const ra=document.getElementById('rhythm-area');
    rw.style.transform='none'; rw.style.animation='none';
    ra.style.animation='none'; ra.style.clipPath='none'; ra.style.filter='none';
    document.getElementById('feedback-msg').style.transform='none';
    document.getElementById('main-panel').style.transform='none';
    document.getElementById('game-screen').style.transform='none';

    setJudgeCenter(50);
    document.getElementById('beat-marker').style.opacity='0.7';
    document.getElementById('beat-marker').style.background='#ffff00';

    const rb=document.getElementById('rhythm-bar');

    document.querySelectorAll('.fake-marker,.gimmick-mouse-wrapper,.gimmick-cat-arm,.pacman,.explosion-particle').forEach(e=>e.remove());
    clearInterval(distractionInterval); distractionInterval=null;

    speed = ROUND_SPEEDS[r] || ROUND_SPEEDS[7];
    clearInterval(gameLoop);
    gameLoop=setInterval(gameLoopTick,16);
    setupGimmick(r);
}

/* ═══ 게임 루프 ═══ */
function gameLoopTick(){
    if(barFrozen) return;
    barPos += (speedBurst ? speed*1.28 : speed) * barDir;
    if(barPos>=100){barPos=100;barDir=-1;}
    if(barPos<=0){barPos=0;barDir=1;}

    // rhythm-area 내부 너비 기준으로 이동
    // rhythm-area = 580px, border 4px*2 = 내부 572px
    // moving-bar 폭 18px → 중앙 기준 이동 범위: 0 ~ (572-18) = 554px
    // barPos 50 = 277px left → moving-bar 중앙 = 277+9 = 286px
    // beat-marker left:50% of 572 = 286px ✓ 일치
    const innerW = 572; // 580 - border 4px*2
    const barW   = 18;
    const maxLeft = innerW - barW; // 554
    document.getElementById('rhythm-bar').style.left=`${Math.max(0,Math.min(maxLeft,(barPos/100)*maxLeft))}px`;

    if(pacmanActive){
        const pac=document.querySelector('.pacman'),bar=document.getElementById('rhythm-area');
        if(pac&&bar){ const pR=pac.getBoundingClientRect(),bR=bar.getBoundingClientRect(); if(pR.left<bR.right){ let e=bR.right-(pR.left+pR.width*0.5); if(e>0){ e=Math.min(e,bar.clientWidth); bar.style.clipPath=`inset(0 ${e}px 0 0)`; } } }
    }
}

/* ═══ 기믹 ═══ */
function setupGimmick(round){
    const ra=document.getElementById('rhythm-area');
    if(round===2){ spawnBouncingMouse(); }
    else if(round===3){ setTimeout(spawnCatPawTop,300); distractionInterval=setInterval(()=>{if(!locked)spawnCatPawTop();},1000); gimmickMovingMarker(); }
    else if(round===4){ setTimeout(spawnPacman,400); gimmickSpeedBurst(); }
    else if(round===5){ gimmickFakeMarkers(); }
    else if(round===6){ ra.style.animation='fade-dark 5s forwards'; }
    else if(round===7){ document.getElementById('rhythm-wrapper').style.animation='spin-rhythm 3.6s linear infinite'; gimmickFreeze(); }
}

function gimmickMovingMarker(){
    let t=0;
    const iv=setInterval(()=>{
        if(locked){clearInterval(iv); setJudgeCenter(50); return;}
        t+=0.03;
        setJudgeCenter(50 + Math.sin(t)*14);
    },50);
}

function gimmickSpeedBurst(){
    const iv=setInterval(()=>{
        if(locked){clearInterval(iv);return;}
        speedBurst=true;
        setTimeout(()=>{speedBurst=false;},300);
    },2500);
}

function gimmickFakeMarkers(){
    const ra=document.getElementById('rhythm-area');
    setJudgeCenter(28);
    const innerW=572, barW=18, maxLeft=innerW-barW, markerW=20;
    [50, 72].forEach(slot=>{
        const fm=document.createElement('div');
        fm.className='fake-marker';
        const px = (slot/100)*maxLeft + barW/2 - markerW/2;
        fm.style.left = px+'px';
        fm.style.transform = 'none';
        ra.appendChild(fm);
    });
}

function gimmickFreeze(){
    let ft=null;
    const iv=setInterval(()=>{
        if(locked){clearInterval(iv);if(ft)clearTimeout(ft);barFrozen=false;document.getElementById('rhythm-bar').style.background='#ff2222';return;}
        if(barFrozen)return;
        barFrozen=true;
        document.getElementById('rhythm-bar').style.background='#44aaff';
        ft=setTimeout(()=>{barFrozen=false;document.getElementById('rhythm-bar').style.background='#ff2222';barDir=Math.random()>.5?1:-1;},720);
    },2700);
}

function spawnBouncingMouse(){
    const el=document.createElement('div');el.className='gimmick-mouse-wrapper';el.style.backgroundImage=`url('${PROC['mouse']||RAW_IMAGES.mouse}')`;document.body.appendChild(el);
    let x=innerWidth/2,y=innerHeight/2,vx=(Math.random()>.5?1:-1)*28,vy=(Math.random()>.5?1:-1)*22;let phase='bounce',phaseTimer=0;const rw=document.getElementById('rhythm-wrapper');
    const mi=setInterval(()=>{
        if(locked||!document.body.contains(el)){clearInterval(mi);el.remove();return;}
        phaseTimer+=16;
        if(phase==='bounce'&&phaseTimer>1500){phase='hover';phaseTimer=0;}else if(phase==='hover'&&phaseTimer>2000){phase='bounce2';phaseTimer=0;vx=(Math.random()>.5?1:-1)*30;vy=-25;}
        if(phase==='bounce'||phase==='bounce2'){x+=vx;y+=vy;if(x<-100||x>innerWidth+100)vx*=-1;if(y<-100||y>innerHeight+100)vy*=-1;if(phase==='bounce2'&&phaseTimer>2500){clearInterval(mi);el.style.transition='opacity .3s';el.style.opacity='0';setTimeout(()=>el.remove(),300);return;}}
        else{const rr=rw.getBoundingClientRect();const wb=Math.sin(phaseTimer*.006)*18;x+=(rr.left+rr.width*.5+wb-x)*.12;y+=(rr.top-30-y)*.12;vx=wb*.5;}
        el.style.left=x+'px';el.style.top=y+'px';el.style.transform=`translate(-50%,-50%) rotate(${Math.atan2(vy,vx)*180/Math.PI}deg) scaleY(${vx<0?-1:1})`;
    },16);
}

function spawnCatPawTop(){
    const src=PROC['catPaw']||RAW_IMAGES.catPaw;const rwRect=document.getElementById('rhythm-wrapper').getBoundingClientRect();const targetBottom=rwRect.bottom+30;const probe=new Image();
    probe.onload=function(){
        const W=220,H=Math.round(probe.naturalHeight*(W/probe.naturalWidth));const finalTop=targetBottom-H,startTop=-H;const paw=document.createElement('div');paw.className='gimmick-cat-arm';paw.style.backgroundImage=`url('${src}')`;paw.style.width=W+'px';paw.style.height=H+'px';paw.style.left=`${10+Math.random()*55}%`;paw.style.top=startTop+'px';paw.style.transition='top .22s cubic-bezier(0.1,.8,.2,1)';document.body.appendChild(paw);
        requestAnimationFrame(()=>requestAnimationFrame(()=>{paw.style.top=finalTop+'px';}));
        setTimeout(()=>{const gs=document.getElementById('game-screen');gs.style.transform='translateY(12px)';setTimeout(()=>gs.style.transform='translateY(-6px)',45);setTimeout(()=>gs.style.transform='none',90);},210);
        setTimeout(()=>{paw.style.transition='top .2s ease-in';paw.style.top=startTop+'px';},520);setTimeout(()=>paw.remove(),740);
    };
    probe.onerror=()=>{probe.naturalWidth=220;probe.naturalHeight=1000;probe.onload();};probe.src=src;
}

function spawnPacman(){
    pacmanActive=true;const p=document.createElement('div');p.className='pacman';document.getElementById('rhythm-wrapper').appendChild(p);setTimeout(()=>{p.remove();pacmanActive=false;},5500);
}

/* ═══════════════════════════════════════════════
   ★ 판정 처리 — barPos vs markerCenter 직접 비교
   
   barPos와 markerCenter 모두 0~100 단위.
   DOM 좌표(getBoundingClientRect) 완전히 사용 안 함.
   → spin/transform/clipPath 영향 없음.
   
   판정 구간 (barPos 기준 %, 580px 환산):
     PERFECT : diff ≤ 3   (약 ±15px — 노란 마커 폭과 일치)
     GOOD    : diff ≤ 10  (약 ±50px — good-zone 60px의 절반)
     BAD     : diff ≤ 17
     MISS    : 그 이상
═══════════════════════════════════════════════ */
function handleInput(e){
    if(locked) return;
    if(e.type==='keydown' && e.code!=='Space') return;
    if(e.type==='keydown') e.preventDefault();
    // 터치 이벤트면 기본동작(ghost mousedown 등) 차단
    if(e.type==='touchstart') e.preventDefault();
    const now=Date.now(); if(now-lastClickTime<300) return; lastClickTime=now;
    if(step>=currentRecipe.length) return;

    const diff = Math.abs(barPos - markerCenter);

    let pt, q, msg;
    if(diff <= 2)       { pt=10; q='perfect'; msg='PERFECT!!'; sfxPerfect(); totalPerfect++; }
    else if(diff <= 11) { pt=5;  q='good';    msg='GOOD';      sfxGood();    totalGood++;    }
    else if(diff <= 25) { pt=1;  q='bad';     msg='BAD';       sfxBad();     totalBad++;     }
    else                { pt=0;  q='trash';   msg='MISS...';   sfxMiss();    totalMiss++;    }

    const me=document.getElementById('feedback-msg');
    me.innerText=msg; me.style.color=q==='perfect'?'#55ff55':q==='good'?'yellow':'red';

    const div=document.createElement('div'); div.className=`g-base ${currentRecipe[step]}`; div.style.bottom=`${10+step*25}px`;
    let tx=0,ty=0,rot=0;
    if(q!=='perfect'){const f=q==='good'?.5:q==='bad'?2.5:5;tx=(Math.random()-.5)*30*f;ty=(Math.random()-.5)*20*f;rot=(Math.random()-.5)*30*f;}
    div.style.transform=`translateX(calc(-50% + ${tx}px)) translateY(${ty}px) rotate(${rot}deg)`;
    document.getElementById('stack-zone').appendChild(div);

    score+=pt; step++;
    if(step>=currentRecipe.length) finishRound();
}

/* ═══ 라운드 종료 ═══ */
function finishRound(){
    locked=true; clearInterval(gameLoop); clearInterval(distractionInterval); pacmanActive=false;
    createExplosion();
    const final=Math.min((score/(currentRecipe.length*10))*100,100); totalSum+=final;
    let tag,css;
    if(final>=95){tag='[A] 전설의 김밥';css='tag-legend';}else if(final>=80){tag='[B] 아주 맛있어요';css='tag-legend';}else if(final>=60){tag='[C] 무난하네요';css='';}else if(final>=40){tag='[D] 옆구리 터짐';css='tag-bad';}else{tag='[E] 이건 쓰레기야';css='tag-trash';}
    const item=document.createElement('div'); item.className='history-item new-slam';
    item.innerHTML=`<div class="mini-gimbap ${currentRecipeIcon}"></div><div><div class="${css}">${tag}</div><div style="color:#666;font-size:.75rem">${currentRecipeName}<br>${final.toFixed(0)}점</div></div>`;
    document.getElementById('history-list').prepend(item);
    const mp=document.getElementById('main-panel');
    mp.style.transform='translate(-10px,10px)'; setTimeout(()=>mp.style.transform='translate(10px,-10px)',50); setTimeout(()=>mp.style.transform='none',100);
    setTimeout(()=>item.classList.remove('new-slam'),400);
    setTimeout(()=>{r++; if(r>7)openNameModal(); else initRound();},1200);
}

function createExplosion(){
    const board=document.getElementById('board-container'); const cols=['red','yellow','white','black','#33cc33','#ff66aa'];
    for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='explosion-particle'; p.style.cssText=`width:10px;height:10px;border:2px solid black;background:${cols[i%cols.length]};left:50%;top:50%;`; p.style.setProperty('--tx',`${(Math.random()-.5)*400}px`); p.style.setProperty('--ty',`${(Math.random()-.5)*400}px`); p.style.animation='explode .8s ease-out forwards'; board.appendChild(p); setTimeout(()=>p.remove(),800); }
}

/* ═══ 자격증 ═══ */
function showLicense(){
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('license-screen').classList.remove('hidden');
    sfxFanfare();
    const avg=totalSum/7, grade=getGrade(avg), rd=RANK_DATA[grade];
    document.getElementById('capture-area').className=`license-paper ${rd.theme}`;
    document.getElementById('lic-grade-chip').innerText=`${rd.badge} GRADE`;
    document.getElementById('lic-name').innerText=userName;
    document.getElementById('lic-rank').innerText=`${rd.rankLabel} · ${rd.rankName}`;
    document.getElementById('lic-quote').innerText=rd.desc;
    document.getElementById('lic-score').innerText=avg.toFixed(1);
    document.getElementById('lic-stats').innerHTML=`
        <div class="stat-item"><span class="stat-num">${totalPerfect}</span>PERFECT</div>
        <div class="stat-item"><span class="stat-num">${totalGood}</span>GOOD</div>
        <div class="stat-item"><span class="stat-num">${totalBad}</span>BAD</div>
        <div class="stat-item"><span class="stat-num">${totalMiss}</span>MISS</div>`;
    const box=document.getElementById('cert-illust-stage'), img=document.getElementById('cert-illust-img'), ph=document.getElementById('cert-illust-ph');
    const src=`illust-${grade.toLowerCase()}.png`;
    const probe=new Image();
    probe.onload=()=>{ img.src=src; ph.textContent=''; box.classList.remove('no-illust'); };
    probe.onerror=()=>{ img.removeAttribute('src'); ph.textContent=`${src} 파일을 넣으시면 여기에 표시됩니다`; box.classList.add('no-illust'); };
    probe.src=src;
}

/* ═══ 공유 ═══ */
async function captureCard(){
    const p=document.getElementById('capture-area'), seal=p.querySelector('.cert-seal'), img=document.getElementById('cert-illust-img');
    p.style.animation='none'; p.style.clipPath='none'; p.style.transform='none';
    if(seal){seal.style.animation='none';seal.style.opacity='1';seal.style.transform='rotate(-15deg)';}
    if(img&&img.src){ await new Promise(res=>{ if(img.complete)res(); else{img.onload=res;img.onerror=res;} }); }
    return await html2canvas(p,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false});
}
async function saveImage(){
    try{ const cv=await captureCard(); const a=document.createElement('a'); a.href=cv.toDataURL('image/png'); a.download=`김밥마스터_${userName||'result'}.png`; document.body.appendChild(a); a.click(); a.remove(); }
    catch(err){ console.error(err); alert('이미지 저장에 실패했습니다.'); }
}
const SITE_URL='https://dotolimuk100-hash.github.io/Kimbapmaria/';
function shareTwitter(){ const avg=(totalSum/7).toFixed(1),g=getGrade(totalSum/7); window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(`김밥 자격증 ${g}랭크! ${avg}점\n#전설의고향김밥 #김밥마스터\n${SITE_URL}`)}`,'_blank'); }
